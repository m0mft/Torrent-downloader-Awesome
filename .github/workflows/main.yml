name: Ultimate Torrent Download (qBittorrent)

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'Direct Torrent Link or Magnet Link'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OS Network Tuning (Max Performance)
        run: |
          sudo sysctl -w net.core.rmem_max=67108864
          sudo sysctl -w net.core.wmem_max=67108864
          sudo sysctl -w net.ipv4.tcp_rmem="4096 87380 67108864"
          sudo sysctl -w net.ipv4.tcp_wmem="4096 65536 67108864"
          sudo sysctl -w net.core.netdev_max_backlog=250000
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr
          sudo sysctl -w net.core.somaxconn=4096

      - name: Install qBittorrent-nox and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y qbittorrent-nox jq

      - name: Configure qBittorrent (Fix Save Path & Aggressive Settings)
        run: |
          mkdir -p ~/.config/qBittorrent
          mkdir -p ${{ github.workspace }}/downloads
          
          cat <<EOF > ~/.config/qBittorrent/qBittorrent.conf
          [BitTorrent]
          Session\DefaultSavePath=${{ github.workspace }}/downloads
          Session\MaxTotalConnections=5000
          Session\MaxConnectionsPerTorrent=2500
          Session\MaxUploads=10
          Session\MaxUploadsPerTorrent=10
          Session\MaxActiveDownloads=1
          Session\MaxActiveTorrents=1
          Session\GlobalMaxSeedingMinutes=1
          Session\QueueingSystemEnabled=false
          
          [Network]
          PortForwardingEnabled=false
          PortRangeMin=6881
          PortRangeMax=6889
          
          [Preferences]
          Connection\GlobalDLLimitAlt=0
          Connection\GlobalUPLimitAlt=0
          Downloads\DiskWriteCacheSize=512
          Bittorrent\DHT=true
          Bittorrent\PeX=true
          Bittorrent\LSD=true
          
          [LegalNotice]
          Accepted=true
          EOF

      - name: Start qBittorrent and Add Torrent
        run: |
          # Start daemon
          qbittorrent-nox -d
          sleep 5 # Wait for daemon to initialize
          
          # Add torrent via Web API (Default port 8080, bypass auth for localhost by default in nox)
          curl -s -X POST -d "urls=${{ github.event.inputs.torrent_url }}" http://localhost:8080/api/v2/torrents/add
          
          echo "Torrent added. Waiting for metadata..."
          sleep 5

      - name: Monitor Download Progress
        run: |
          echo "Monitoring qBittorrent API..."
          while true; do
            # Fetch torrent info
            RESPONSE=$(curl -s http://localhost:8080/api/v2/torrents/info)
            
            # Check if empty (torrent not registered yet)
            if [ "$RESPONSE" = "[]" ] || [ -z "$RESPONSE" ]; then
              echo "Waiting for torrent to register..."
              sleep 5
              continue
            fi
            
            # Extract metrics using jq
            PROGRESS=$(echo $RESPONSE | jq -r '.[0].progress // 0')
            STATE=$(echo $RESPONSE | jq -r '.[0].state // "unknown"')
            DLSPEED=$(echo $RESPONSE | jq -r '.[0].dlspeed // 0')
            SEEDS=$(echo $RESPONSE | jq -r '.[0].num_seeds // 0')
            PEERS=$(echo $RESPONSE | jq -r '.[0].num_leechs // 0')
            
            # Convert speed from bytes/s to MB/s
            SPEED_MB=$(echo "scale=2; $DLSPEED / 1048576" | bc)
            PERCENT=$(echo "scale=2; $PROGRESS * 100" | bc)
            
            echo "Status: $STATE | Progress: $PERCENT% | Speed: $SPEED_MB MB/s | Seeds: $SEEDS | Peers: $PEERS"
            
            if [ "$STATE" = "pausedUP" ] || [ "$STATE" = "uploading" ] || [ "$STATE" = "stalledUP" ] || [ $(echo "$PROGRESS == 1" | bc) -eq 1 ]; then
              echo "✅ Download Complete!"
              break
            fi
            
            sleep 10
          done

      - name: Compress Downloaded Files
        run: |
          echo "Compressing files from ${{ github.workspace }}/downloads..."
          cd ${{ github.workspace }}/downloads
          tar -czf ${{ github.workspace }}/download-archive.tar.gz ./*
          echo "Compression complete."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Torrent-Download
          path: ${{ github.workspace }}/download-archive.tar.gz
