name: Advanced Torrent Download (qBittorrent)

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet link to download'
        required: true
        type: string
      upload_as:
        description: 'Artifact name (optional)'
        required: false
        type: string

jobs:
  downloader:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install qBittorrent & jq
        run: |
          sudo apt-get update
          sudo apt-get install -y qbittorrent-nox jq

      - name: Configure qBittorrent for Maximum Performance
        run: |
          mkdir -p ~/.config/qBittorrent
          mkdir -p ./downloads
          
          # Inject optimized settings
          cat <<EOF > ~/.config/qBittorrent/qBittorrent.conf
          [Preferences]
          WebUI\LocalHostAuth=false
          Downloads\SavePath=$(pwd)/downloads/
          Connection\GlobalDLLimit=0
          Connection\GlobalUPLimit=10
          Connection\MaxTotalConnections=2000
          Connection\MaxConnectionsPerTorrent=1000
          BitTorrent\Session\DHTEnabled=true
          BitTorrent\Session\PeXEnabled=true
          BitTorrent\Session\LSDEnabled=true
          Advanced\AnnounceToAllTrackers=true
          EOF

      - name: Start qBittorrent Daemon
        run: |
          qbittorrent-nox -d
          echo "Waiting for WebUI to start..."
          sleep 5
          curl -s http://localhost:8080/api/v2/app/version || (echo "❌ WebUI failed to start" && exit 1)
          echo "✅ qBittorrent started successfully"

      - name: Add Torrent & Monitor Progress
        run: |
          MAGNET="${{ github.event.inputs.magnet_link }}"
          
          # Add the magnet link
          curl -s -X POST -d "urls=$MAGNET" http://localhost:8080/api/v2/torrents/add
          echo "Torrent added. Waiting for metadata and downloading..."
          
          # Polling loop to check download progress
          while true; do
            INFO=$(curl -s http://localhost:8080/api/v2/torrents/info)
            
            # If no torrent is found yet, loop again
            if [ "$INFO" == "[]" ]; then
              echo "Waiting for metadata..."
              sleep 5
              continue
            fi
            
            PROGRESS=$(echo "$INFO" | jq -r '.[0].progress')
            STATE=$(echo "$INFO" | jq -r '.[0].state')
            NAME=$(echo "$INFO" | jq -r '.[0].name')
            
            # Convert progress to percentage
            PERCENT=$(awk -v p="$PROGRESS" 'BEGIN { printf "%.2f", p * 100 }')
            echo "Status: $STATE | Progress: $PERCENT% | Name: $NAME"
            
            if [[ "$PROGRESS" == "1" || "$STATE" == "pausedUP" || "$STATE" == "stalledUP" || "$STATE" == "uploading" ]]; then
              echo "✅ Download complete!"
              break
            fi
            
            sleep 10
          done

      - name: Kill qBittorrent
        run: pkill qbittorrent-nox || true

      - name: Compress Files
        run: |
          if [ -z "$(ls -A ./downloads)" ]; then
            echo "❌ Download failed or no files found"
            exit 1
          fi
          echo "📦 Compressing files..."
          tar -czf download-archive.tar.gz -C ./downloads .

      - name: Generate artifact name
        id: artifact_name
        run: |
          if [ -z "${{ github.event.inputs.upload_as }}" ]; then
            echo "name=qbit-download-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.inputs.upload_as }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: download-archive.tar.gz
          retention-days: 7
