name: Advanced Torrent Download - Latest aria2

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'magnet to download'
        type: string
      upload_as:
        description: 'Artifact name (optional, defaults to auto-generated)'
        required: false
        type: string

jobs:
  downloader:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential automake autoconf libcppunit-dev libssl-dev libxml2-dev libz-dev libsqlite3-dev pkg-config curl jq git

      - name: Build latest aria2 from source
        run: |
          cd /tmp
          git clone https://github.com/aria2/aria2.git
          cd aria2
          autoreconf -i
          ./configure --prefix=/usr/local \
            --with-libcares \
            --with-openssl \
            --with-sqlite3 \
            --with-zlib
          make -j$(nproc)
          sudo make install
          /usr/local/bin/aria2c --version

      - name: Validate magnet link
        run: |
          if [[ ! "${{ github.event.inputs.magnet_link }}" =~ ^magnet:\? ]]; then
            echo "❌ Invalid magnet link format"
            exit 1
          fi
          echo "✅ Magnet link validated"

      - name: Create download directory
        run: mkdir -p ./downloads

      - name: Download torrent - MAXIMUM SPEED OPTIMIZED
        run: |
          cd ./downloads
          /usr/local/bin/aria2c \
            --max-concurrent-downloads=1 \
            --split=32 \
            --min-split-size=5M \
            --max-connection-per-server=32 \
            --max-tries=5 \
            --retry-wait=1 \
            --seed-time=0 \
            --seed-ratio=0 \
            --bt-max-peers=256 \
            --bt-max-open-connections=256 \
            --dht-listen-port=6881-6889 \
            --listen-port=6881-6889 \
            --timeout=300 \
            --connect-timeout=120 \
            --continue=true \
            --allow-overwrite=true \
            --auto-file-renaming=false \
            "${{ github.event.inputs.magnet_link }}"
        continue-on-error: true

      - name: Check download status
        run: |
          if [ -z "$(ls -A ./downloads)" ]; then
            echo "❌ Download failed or no files found"
            exit 1
          fi
          echo "✅ Download completed"
          du -sh ./downloads
          ls -lh ./downloads

      - name: Generate artifact name
        id: artifact_name
        run: |
          if [ -z "${{ github.event.inputs.upload_as }}" ]; then
            ARTIFACT_NAME="torrent-download-$(date +%Y%m%d-%H%M%S)"
          else
            ARTIFACT_NAME="${{ github.event.inputs.upload_as }}"
          fi
          echo "name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: ./downloads

      - name: Summary
        run: |
          echo "📊 Download Summary"
          echo "===================="
          echo "Artifact: ${{ steps.artifact_name.outputs.name }}"
          echo "Size: $(du -sh ./downloads | cut -f1)"
          echo "Files: $(find ./downloads -type f | wc -l)"
