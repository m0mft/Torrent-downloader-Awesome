name: Advanced Torrent Download (qBittorrent)

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link to download'
        required: true
        type: string
      free_disk_space:
        description: 'Free up runner disk space (~30GB) before downloading'
        required: false
        type: boolean
        default: false

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Optional)
        if: ${{ inputs.free_disk_space == true }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: OS-Level Network Tuning
        run: |
          sudo sysctl -w net.core.rmem_max=2500000
          sudo sysctl -w net.core.wmem_max=2500000
          sudo sysctl -w net.ipv4.tcp_rmem="4096 87380 2500000"
          sudo sysctl -w net.ipv4.tcp_wmem="4096 65536 2500000"
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qbittorrent-nox jq

      - name: Configure and Start qBittorrent
        run: |
          mkdir -p ~/.config/qBittorrent
          mkdir -p ${{ github.workspace }}/downloads

          cat <<EOF > ~/.config/qBittorrent/qBittorrent.conf
          [BitTorrent]
          Session\DefaultSavePath=${{ github.workspace }}/downloads
          Session\PortForwardingEnabled=true
          Session\MaxActiveDownloads=-1
          Session\MaxActiveTorrents=-1
          Session\GlobalMaxSeedingMinutes=1
          
          [Connection]
          RandomPort=true
          
          [Network]
          Cookies=@Invalid()
          
          [Preferences]
          WebUI\LocalHostAuth=false
          EOF

          qbittorrent-nox -d
          
          echo "Waiting for qBittorrent Web API to start..."
          until curl -s http://127.0.0.1:8080/api/v2/app/webapiVersion > /dev/null; do
            sleep 1
          done
          echo "qBittorrent is ready!"

      - name: Download Torrent
        run: |
          # Add the torrent via API and FORCE the savepath
          curl -s -X POST \
            -F "urls=${{ inputs.magnet_link }}" \
            -F "savepath=${{ github.workspace }}/downloads" \
            http://127.0.0.1:8080/api/v2/torrents/add
          
          echo "Monitoring download..."
          sleep 5
          
          while true; do
            RESPONSE=$(curl -s http://127.0.0.1:8080/api/v2/torrents/info)
            
            # Check if response is valid JSON
            if ! echo "$RESPONSE" | jq . >/dev/null 2>&1; then
               sleep 2
               continue
            fi

            STATE=$(echo "$RESPONSE" | jq -r '.[0].state')
            PROGRESS=$(echo "$RESPONSE" | jq -r '.[0].progress')
            DLSPEED=$(echo "$RESPONSE" | jq -r '.[0].dlspeed')
            SEEDS=$(echo "$RESPONSE" | jq -r '.[0].num_seeds')
            TOTAL_SEEDS=$(echo "$RESPONSE" | jq -r '.[0].num_complete')
            PEERS=$(echo "$RESPONSE" | jq -r '.[0].num_leechs')
            
            if [ "$STATE" == "null" ] || [ -z "$STATE" ]; then
               sleep 3
               continue
            fi

            PROG_PERCENT=$(awk "BEGIN {printf \"%.2f\", $PROGRESS * 100}")
            SPEED_MB=$(awk "BEGIN {printf \"%.2f\", $DLSPEED / 1048576}")
            
            echo "State: $STATE | Progress: $PROG_PERCENT% | Speed: $SPEED_MB MB/s | Seeds: $SEEDS/$TOTAL_SEEDS | Peers: $PEERS"
            
            if [[ "$STATE" == "pausedUP" || "$STATE" == "stalledUP" || "$STATE" == "uploading" || "$PROG_PERCENT" == "100.00" ]]; then
              echo "Download Completed!"
              # Give qBittorrent time to flush files to disk
              sleep 10 
              break
            fi
            
            sleep 3
          done

      - name: Stop qBittorrent
        run: |
          # Gracefully ask it to stop and wait for it to exit
          pkill qbittorrent-nox
          sleep 5

      - name: Compress Downloaded Files (tar.gz)
        run: |
          # Use -C to change directory safely without using wildcards
          tar -czvf ${{ github.workspace }}/downloaded_files.tar.gz -C ${{ github.workspace }}/downloads .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-torrent-archive
          path: ${{ github.workspace }}/downloaded_files.tar.gz
          if-no-files-found: error
